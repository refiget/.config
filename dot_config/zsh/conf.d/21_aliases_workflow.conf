# Personal workflow aliases
# ============================================================

# scripts/ is exported into PATH in 02_path_env.conf for direct use,
# but these wrappers call the repo-local helpers explicitly.
__run_dotfiles_helper() {
  local helper_name="$1"
  local label="$2"
  shift 2

  local helper_root="${SCRIPTS_DIR:-$HOME/scripts}"
  local helper="$helper_root/$helper_name"

  if [[ ! -x "$helper" ]]; then
    echo "$label: missing helper: $helper"
    return 127
  fi

  "$helper" "$@"
}



tmuxclean() {
  if [[ -z "${TMUX:-}" ]]; then
    echo "tmuxclean: run this inside tmux"
    return 1
  fi

  bash "$HOME/.config/tmux/scripts/tmux_clean.sh" || return $?
  python3 "$HOME/.config/tmux/scripts/session_manager.py" ensure
}

